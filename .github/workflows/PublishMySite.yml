name: Publish to GitHub Pages

on:
  push:
    branches:
      - main

# 1. 自动取消旧构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 365  # 足够 git-revision-date-localized 显示 timeago

      # 2. 启用 Python + pip 缓存
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 3. 缓存 MkDocs 构建产物 (site/)，避免重复构建未变更页面
      - uses: actions/cache@v4
        with:
          path: .cache
          key: mkdocs-cache-${{ runner.os }}-${{ hashFiles('docs/**') }}
          restore-keys: |
            mkdocs-cache-${{ runner.os }}-

      # 4. 安装依赖
      - run: pip install -r requirements.txt

      # 5. 构建并部署
      - run: mkdocs gh-deploy --force
